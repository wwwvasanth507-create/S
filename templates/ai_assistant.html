{% extends "layout.html" %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto; height: 80vh; display: flex; flex-direction: column;">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1
            style="background: linear-gradient(90deg, #fff, var(--secondary-color)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 0;">
            AI Learning Assistant</h1>
        <p style="color: var(--text-secondary);">Solving doubts, answering questions, and helping you learn.</p>
    </div>

    <div class="card" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0;">
        <!-- Chat History -->
        <div id="chat-history"
            style="flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px;">
            <div
                style="align-self: flex-start; background: rgba(255, 255, 255, 0.05); padding: 12px 16px; border-radius: 12px 12px 12px 0; max-width: 80%;">
                Hello! I am your AI Assistant. How can I help you today?
            </div>
        </div>

        <!-- Input Area -->
        <div
            style="padding: 20px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--glass-border); display: flex; gap: 12px;">
            <input type="text" id="chat-input" placeholder="Ask a question..."
                style="margin: 0; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); flex: 1;">
            <button onclick="sendMessage()" class="btn" style="padding: 0 24px;">
                <i class="material-icons">send</i>
            </button>
        </div>
    </div>
</div>

<script>
    const chatHistory = document.getElementById('chat-history');
    const chatInput = document.getElementById('chat-input');

    chatInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    function appendMessage(text, isUser) {
        const div = document.createElement('div');
        div.style.padding = '12px 16px';
        div.style.maxWidth = '80%';
        div.style.marginBottom = '8px';

        if (isUser) {
            div.style.alignSelf = 'flex-end';
            div.style.background = 'linear-gradient(135deg, var(--primary-color), #512da8)';
            div.style.color = 'white';
            div.style.borderRadius = '12px 12px 0 12px';
        } else {
            div.style.alignSelf = 'flex-start';
            div.style.background = 'rgba(255, 255, 255, 0.05)';
            div.style.color = '#ddd';
            div.style.borderRadius = '12px 12px 12px 0';
        }

        div.textContent = text;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        appendMessage(text, true);
        chatInput.value = '';

        // Show loading
        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.textContent = 'Typing...';
        loadingDiv.style.alignSelf = 'flex-start';
        loadingDiv.style.color = '#666';
        loadingDiv.style.fontSize = '0.8rem';
        loadingDiv.style.marginLeft = '10px';
        chatHistory.appendChild(loadingDiv);

        fetch('/api/ai_chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById(loadingId).remove();
                appendMessage(data.response, false);
            })
            .catch(err => {
                document.getElementById(loadingId).remove();
                appendMessage("Sorry, I encountered an error.", false);
            });
    }
</script>
{% endblock %}
